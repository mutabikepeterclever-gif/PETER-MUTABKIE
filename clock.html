<!DOCTYPE html>
<head>
    <title>
        Digital clock
    </title>
    <style> 
    body {
        background-color: rgb(146, 26, 26);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 200vh;
        font-family: Arial, Helvetica, sans-serif;

    }
     #clock {
        color: beige;
        font-size: 70px;
        border: 2px solid blue;
        padding: 20px 40px;
        border-radius: 10px;
     }

</style>

</head> 

<body>
<div id="clock"></div>

</body>

<script>
    function updateClock(){
        const now=new Date();
        let d =now.getDay();
        let h =now.getHours();
        let m =now.getMinutes();
        let s =now.getSeconds();

        let days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

         let session = "AM";

    if (h >= 12) {
        session = "PM";
    }

    if (h > 12) {
        h = h - 12;
    }

    if (h == 0) {
        h = 12;
    }

        h=h< 10 ? "0" + h:h;
        m=m<10 ? "0" + m:m;
        s=s<10 ? "0" + s:s;

        document.getElementById("clock").innerText=h+":"+m+":"+s +"="+ session;
        document.getElementById("day").innerText = days[d];
  
    }
setInterval(updateClock,1000);
        updateClock();
</script>
